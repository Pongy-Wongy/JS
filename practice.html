<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="alert-box" id="alert">
      <p id="title">알림창입니다</p>
      <!--<button onclick="알림창열기('none')">닫기</button>-->
      <button id="close">닫기</button>
    </div>

    <!--<button onclick="아이디알림창('아이디입력', 'block')">버튼1</button>
    <button onclick="비번알림창('비번입력', 'block')">버튼2</button>-->

    <button onclick="버튼알림창('아이디입력', 'block')">버튼1</button>
    <button onclick="버튼알림창('비번입력', 'block')">버튼2</button>
  </body>
</html>
<script>
  document.getElementById("close").addEventListener("click", function () {
    document.getElementById("alert").style.display = "none";
  });

  //     document.getElementById("alert").style.display = 구멍2;
  //   }

  //     document.getElementById("title").innerText = 구멍1;
  //     document.getElementById("alert").style.display = 구멍2;
  //   }

  //리팩토링

  function 버튼알림창(구멍1, 구멍2) {
    document.getElementById("title").innerText = 구멍1;
    document.getElementById("alert").style.display = 구멍2;
  }
</script>
